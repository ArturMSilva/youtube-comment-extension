<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommentLens</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>CommentLens</h1>
                <span class="header-subtitle">Análise de comentários</span>
            </div>
        </header>

        <div class="main-section">
            <button id="start-analysis" class="btn-primary">
                <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Analisar comentários
            </button>

            <div id="status-message" class="status-message">
                Pronto para analisar
            </div>
        </div>

        <div id="qa-interface" class="qa-section hidden">
            <div class="section-header">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="17" r="1" fill="currentColor"/>
                </svg>
                <h2>Perguntar sobre os comentários</h2>
            </div>

            <textarea
                id="question-input"
                class="input-question"
                placeholder="Digite sua pergunta sobre os comentários…"
                rows="3"
            ></textarea>

            <button id="ask-llm" class="btn-secondary">
                <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Perguntar
            </button>

            <div id="llm-response" class="response-box"></div>

            <div id="source-comments" class="source-comments hidden">
              <div class="source-header">Comentários que confirmam</div>
              <div id="source-list"></div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
